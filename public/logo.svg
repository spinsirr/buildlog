<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#FFFDF5"/>
  <rect x="4" y="4" width="504" height="504" rx="60" stroke="#000000" stroke-width="8" fill="none"/>

  <!-- Terminal window chrome -->
  <rect x="48" y="48" width="416" height="416" rx="12" fill="#000000"/>
  <rect x="48" y="48" width="416" height="64" rx="12" fill="#1A1A1A"/>
  <rect x="48" y="100" width="416" height="12" fill="#1A1A1A"/>

  <!-- Window dots -->
  <circle cx="88" cy="80" r="12" fill="#FF6B6B"/>
  <circle cx="124" cy="80" r="12" fill="#FFD93D"/>
  <circle cx="160" cy="80" r="12" fill="#BFFF00"/>

  <!-- Git commit graph - left line -->
  <line x1="120" y1="152" x2="120" y2="420" stroke="#444444" stroke-width="4"/>

  <!-- Commit nodes on main line -->
  <circle cx="120" cy="180" r="14" fill="#FF6B6B" stroke="#FF6B6B" stroke-width="3"/>
  <circle cx="120" cy="248" r="14" fill="#FFD93D" stroke="#FFD93D" stroke-width="3"/>
  <circle cx="120" cy="316" r="14" fill="#BFFF00" stroke="#BFFF00" stroke-width="3"/>
  <circle cx="120" cy="384" r="14" fill="#FF6B6B" stroke="#FF6B6B" stroke-width="3"/>

  <!-- Arrow/broadcast lines from commits to content -->
  <line x1="140" y1="180" x2="180" y2="180" stroke="#FF6B6B" stroke-width="3" stroke-dasharray="6 4"/>
  <line x1="140" y1="248" x2="180" y2="248" stroke="#FFD93D" stroke-width="3" stroke-dasharray="6 4"/>
  <line x1="140" y1="316" x2="180" y2="316" stroke="#BFFF00" stroke-width="3" stroke-dasharray="6 4"/>
  <line x1="140" y1="384" x2="180" y2="384" stroke="#FF6B6B" stroke-width="3" stroke-dasharray="6 4"/>

  <!-- Post cards / content blocks -->
  <rect x="184" y="160" width="248" height="40" rx="6" fill="#1E1E1E" stroke="#FF6B6B" stroke-width="3"/>
  <rect x="196" y="172" width="80" height="6" rx="3" fill="#FF6B6B"/>
  <rect x="284" y="172" width="48" height="6" rx="3" fill="#555555"/>
  <rect x="340" y="172" width="60" height="6" rx="3" fill="#555555"/>
  <!-- Twitter/X icon hint -->
  <rect x="408" y="168" width="16" height="16" rx="3" fill="#FF6B6B" opacity="0.5"/>

  <rect x="184" y="228" width="248" height="40" rx="6" fill="#1E1E1E" stroke="#FFD93D" stroke-width="3"/>
  <rect x="196" y="240" width="120" height="6" rx="3" fill="#FFD93D"/>
  <rect x="324" y="240" width="36" height="6" rx="3" fill="#555555"/>
  <rect x="368" y="240" width="48" height="6" rx="3" fill="#555555"/>
  <!-- LinkedIn icon hint -->
  <rect x="408" y="236" width="16" height="16" rx="3" fill="#FFD93D" opacity="0.5"/>

  <rect x="184" y="296" width="248" height="40" rx="6" fill="#1E1E1E" stroke="#BFFF00" stroke-width="3"/>
  <rect x="196" y="308" width="96" height="6" rx="3" fill="#BFFF00"/>
  <rect x="300" y="308" width="64" height="6" rx="3" fill="#555555"/>
  <rect x="372" y="308" width="44" height="6" rx="3" fill="#555555"/>
  <!-- Bluesky icon hint -->
  <rect x="408" y="304" width="16" height="16" rx="3" fill="#BFFF00" opacity="0.5"/>

  <rect x="184" y="364" width="248" height="40" rx="6" fill="#1E1E1E" stroke="#FF6B6B" stroke-width="3"/>
  <rect x="196" y="376" width="64" height="6" rx="3" fill="#FF6B6B"/>
  <rect x="268" y="376" width="56" height="6" rx="3" fill="#555555"/>
  <rect x="332" y="376" width="72" height="6" rx="3" fill="#555555"/>
  <rect x="408" y="372" width="16" height="16" rx="3" fill="#FF6B6B" opacity="0.5"/>

  <!-- Cursor blink -->
  <rect x="88" y="430" width="12" height="20" fill="#BFFF00" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
